spring:
  application:
    name: backend-service

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres  # Replace with actual DB name
    username: postgres                              # Replace with actual DB username
    password: 123456                              # Replace with actual DB password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # Automatically update DB schema with face_vector arrays
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

server:
  port: 8080
